<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chateniar — now playing</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; overflow:hidden; }

  .player-card {
    width:100%; height:100%;
    background:linear-gradient(135deg,#0B1F17,#13332A);
    border-radius:14px;
    padding:14px;
    display:flex;
    align-items:center;
    gap:14px;
    border:1px solid rgba(127,217,176,0.18);
  }

  .cover {
    width:54px; height:54px; flex-shrink:0;
    border-radius:12px;
    background:linear-gradient(135deg,#FF3CAC,#784BA0,#2B86C5);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:#ffffff;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    overflow:hidden;
  }

  .cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .info { flex:1; min-width:0; color:#EAF6EF; }

  .label {
    font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
    font-size:10px; color:#FF7AC6;
    text-transform:uppercase; letter-spacing:1.5px;
    margin-bottom:5px;
  }

  .title {
    font-size:14px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .artist {
    font-size:11.5px; color:#9FC7B5;
    margin-bottom:9px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .track {
    background:rgba(255,255,255,0.1);
    border-radius:4px; height:5px; width:100%;
    cursor:pointer; overflow:hidden;
  }

  .fill {
    width:0%; height:100%;
    background:linear-gradient(90deg,#FFB347,#FF7AC6);
    border-radius:4px;
  }

  .times {
    display:flex; justify-content:space-between;
    font-size:10px; color:#9FC7B5; margin-top:4px;
    font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
  }

  .play-btn {
    width:34px; height:34px; flex-shrink:0;
    border-radius:50%;
    background:rgba(255,179,71,0.15);
    border:1px solid rgba(255,179,71,0.4);
    display:flex; align-items:center; justify-content:center;
    color:#FFB347; font-size:14px; cursor:pointer;
    transition:transform 0.15s ease;
  }
  .play-btn:hover { transform:scale(1.07); }
</style>
</head>
<body>

  <div class="player-card">
    <div class="cover" id="cover">&#9835;</div>
    <div class="info">
      <div class="label">&#9835; now playing</div>
      <div class="title" id="track-title">Demo track (chưa gắn bài thiệt)</div>
      <div class="artist" id="track-artist">SoundHelix &middot; chỉ để test player</div>
      <div class="track" id="progress-track">
        <div class="fill" id="progress-fill"></div>
      </div>
      <div class="times"><span id="current-time">0:00</span><span id="duration">0:00</span></div>
    </div>
    <div class="play-btn" id="play-btn">&#9658;</div>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <script>
  (function(){
    var params = new URLSearchParams(window.location.search);

    var audioUrl = params.get('audio');
    var imgUrl   = params.get('img');
    var titleUrl = params.get('title');
    var artistUrl = params.get('artist');
    var loop = params.get("loop") === "1";
    var autoplay = params.get("autoplay") === "1";

    audio.loop = loop;

    var audio  = document.getElementById('audio');
    var btn    = document.getElementById('play-btn');
    var fill   = document.getElementById('progress-fill');
    var track  = document.getElementById('progress-track');
    var curEl  = document.getElementById('current-time');
    var durEl  = document.getElementById('duration');
    var cover  = document.getElementById('cover');
    var titleEl = document.getElementById('track-title');
    var artistEl = document.getElementById('track-artist');

    function fmt(s){
      if(!isFinite(s) || s < 0) return '0:00';
      var m = Math.floor(s/60);
      var sec = Math.floor(s%60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    if(audioUrl) audio.src = audioUrl;
    else audio.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
    if (autoplay) {
    audio.addEventListener("canplay", function autoPlay() {
        audio.removeEventListener("canplay", autoPlay);

        audio.play().then(function () {
            btn.innerHTML = "&#9208;"; // Pause icon
        }).catch(function (err) {
            console.log("Autoplay bị trình duyệt chặn:", err);
        });
    });
}
    if(titleUrl) titleEl.textContent = titleUrl;
    if(artistUrl) artistEl.textContent = artistUrl;

    if(imgUrl){
      cover.innerHTML = '<img src="' + imgUrl + '" alt="cover">';
    }

    audio.addEventListener('loadedmetadata', function(){
      durEl.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', function(){
      if(audio.duration){
        fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        curEl.textContent = fmt(audio.currentTime);
      }
    });

    audio.addEventListener('ended', function(){
      btn.innerHTML = '&#9658;';
    });

    btn.addEventListener('click', function(){
      if(audio.paused){
        audio.play().then(function(){
          btn.innerHTML = '&#9208;';
        }).catch(function(){});
      } else {
        audio.pause();
        btn.innerHTML = '&#9658;';
      }
    });

    track.addEventListener('click', function(e){
      var rect = track.getBoundingClientRect();
      var ratio = (e.clientX - rect.left) / rect.width;
      if(audio.duration){
        audio.currentTime = ratio * audio.duration;
      }
    });
  })();
  </script>

</body>
</html>
